<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h2>Edit Student Details</h2>
        <form method="POST">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ student[0] }}" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" value="{{ student[1] }}" required>
            </div>

            <div class="form-group">
                <label>Course</label>
                <input type="text" name="course" value="{{ student[2] }}" required>
            </div>

            <button type="submit">Update Details</button>
        </form>

        <div class="link-container">
            <a href="/view">&larr; Back to Student List</a>
        </div>
    </div>
</body>

</html>
