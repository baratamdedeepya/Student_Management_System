<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="top-bar">
        <h2>Student List</h2>
        <a href="/logout">Logout</a>
    </div>

    <div class="container wide">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{student[1]}}</td>
                    <td>{{student[2]}}</td>
                    <td>{{student[3]}}</td>
                    <td class="actions">
                        <a href="/edit/{{student[0]}}">Edit</a>
                        <a href="/delete/{{student[0]}}" class="delete">Delete</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="text-align: center; color: #6b7280; padding: 24px;">No students found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="link-container" style="text-align: left;">
            <a href="/">&larr; Back to Registration</a>
        </div>
    </div>
</body>

</html>
